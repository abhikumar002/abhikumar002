name: Generate Snake Contribution Grid

on:
  schedule:
    # Run daily at midnight UTC
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Generates a snake game from a github user (<github_user_name>) contributions graph
      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            assets/snake.svg
            dist/github-contribution-grid-snake.svg?palette=github-dark

      # Commit generated assets/snake.svg directly to main branch
      - name: Commit updated snake SVG to main
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add assets/snake.svg
          git commit -m "chore: auto-update contribution snake SVG [skip ci]" || exit 0
          git push origin main

      # Also push to output branch for gh-pages compatibility
      - name: Push to output branch
        uses: CrazyMaxdev/action-ghpages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
